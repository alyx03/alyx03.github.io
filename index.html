<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三号原点 | Alyx的内心 | 用AI造梦</title>
    <style>
        /* 1. 定义动画，像乐高积木一样可以重复使用 */
        @keyframes scanline {
            0% {
                transform: translateY(-100vh);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent;
            }

            50% {
                border-color: rgba(5, 255, 131, 0.7);
            }

            /*Alyx专属荧光绿*/
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(5, 255, 131, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(5, 255, 131, 0.7);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* 2. 黑客帝国般的深邃背景 */
        body {
            background-color: #0d1117;
            /* 深港蓝 */
            color: #c9d1d9;
            /* 柔和白 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            /* 为扫描线准备 */
        }

        /* 扫描线效果 */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(5, 255, 131, 0.4), transparent);
            animation: scanline 4s linear infinite;
            z-index: 100;
        }

        /* 3. Logo 容器 - 脉动光晕 */
        .logo-container {
            width: 280px;
            border-radius: 12px;
            animation: glow 6s ease-in-out infinite, float 8s ease-in-out infinite;
            /* 脉动+漂浮 */
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .logo-container:hover {
            transform: scale(1.08) rotate(1deg);
            /* 鼠标悬停，增加微动和旋转 */
        }

        /* 4. 文字内容 - “打字机”出现效果 */
        .text-content {
            text-align: center;
            margin-top: 30px;
        }

        /* 大标题 */
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: #05FF83;
            /* Alyx 专属荧光绿 */
            /* 打字机效果： */
            overflow: hidden;
            white-space: nowrap;
            display: inline-block;
            animation: typing 2.5s steps(20, end), blink-caret .7s step-end infinite;
            border-right: 3px solid transparent;
            /* 打字光标 */
        }

        /* 正文内容 */
        p {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.8;
            opacity: 0.9;
        }

        /* 坐标和时间 - 自动打字效果 */
        .info-p {
            margin-top: 25px;
            opacity: 0;
            /* 初始隐藏 */
            animation: typing-fade 1.5s ease-out forwards;
            /* 1.5s 后打字出现 */
            animation-delay: 2s;
            /* 在大标题打字完后开始 */
        }

        /* 为自动出现的文字定义的特殊动画 */
        @keyframes typing-fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 5. 页脚 - “数据网格”纹理 */
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: #3b4249;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <img src="logo.png" alt="三号原点 | Alyx的内心" style="width: 100%; border-radius: 12px;">
    </div>

    <div class="text-content">
        <h1>三号原点</h1>
        <p>从故事出发，用AI造梦，窥见趋势的暗流</p>
        <p class="info-p">坐标：Alyx的内心 | 时间：永远</p>
    </div>

    <div class="footer">
        © 2026 三号原点. Powered by AI Dreams & Alyx Soul.
    </div>
</body>

</html>
