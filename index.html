<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三号原点 | Alyx的内心 | 用AI造梦</title>
    <style>
        /* 1. 定义动画，像乐高积木一样可以重复使用 */
        @keyframes scanline {
            0% {
                transform: translateY(-100vh);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent;
            }

            50% {
                border-color: rgba(5, 255, 131, 0.7);
            }

            /*Alyx专属荧光绿*/
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(5, 255, 131, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(5, 255, 131, 0.7);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* 2. 黑客帝国般的深邃背景 */
        body {
            background-color: #0d1117;
            /* 深港蓝 */
            color: #c9d1d9;
            /* 柔和白 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            /* 为扫描线准备 */
        }

        /* 扫描线效果 */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(5, 255, 131, 0.4), transparent);
            animation: scanline 4s linear infinite;
            z-index: 100;
        }

        /* 3. Logo 容器 - 脉动光晕 */
        .logo-container {
            width: 280px;
            border-radius: 12px;
            animation: glow 6s ease-in-out infinite, float 8s ease-in-out infinite;
            /* 脉动+漂浮 */
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .logo-container:hover {
            transform: scale(1.08) rotate(1deg);
            /* 鼠标悬停，增加微动和旋转 */
        }

        /* 4. 文字内容 - “打字机”出现效果 */
        .text-content {
            text-align: center;
            margin-top: 30px;
        }

        /* 大标题 */
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: #05FF83;
            /* Alyx 专属荧光绿 */
            /* 打字机效果： */
            overflow: hidden;
            white-space: nowrap;
            display: inline-block;
            animation: typing 2.5s steps(20, end), blink-caret .7s step-end infinite;
            border-right: 3px solid transparent;
            /* 打字光标 */
        }

        /* 正文内容 */
        p {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.8;
            opacity: 0.9;
        }

        /* 坐标和时间 - 自动打字效果 */
        .info-p {
            margin-top: 25px;
            opacity: 0;
            /* 初始隐藏 */
            animation: typing-fade 1.5s ease-out forwards;
            /* 1.5s 后打字出现 */
            animation-delay: 2s;
            /* 在大标题打字完后开始 */
        }

        /* 为自动出现的文字定义的特殊动画 */
        @keyframes typing-fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 5. 页脚 - “数据网格”纹理 */
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: #3b4249;
            letter-spacing: 1px;
        }

        /* 简历悬浮窗背景（遮罩层） */
        .modal-overlay {
            display: none;
            /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            /* 半透明黑色背景 */
            backdrop-filter: blur(10px);
            /* 磨砂玻璃效果 */
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* 纯白苹果风简历窗口 */
        .resume-window {
            background: #ffffff;
            width: 90%;
            max-width: 600px;
            height: 80vh;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            color: #1d1d1f;
            overflow-y: auto;
            /* 内容多了可以滚动 */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        /* 窗口打开时的动画 */
        .modal-overlay.active {
            display: flex;
        }

        .modal-overlay.active .resume-window {
            transform: scale(1);
        }

        /* 关闭按钮 */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #86868b;
        }

        /* 简历内的苹果风格文字 */
        .resume-content h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .resume-section {
            margin-bottom: 30px;
            border-bottom: 1px solid #f5f5f7;
            padding-bottom: 15px;
        }

        .resume-section h3 {
            font-size: 17px;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .resume-section p {
            font-size: 16px;
            color: #1d1d1f;
            margin: 5px 0;
        }

        /* 启动按钮样式 */
        .open-resume-btn {
            margin-top: 30px;
            padding: 10px 25px;
            border: 1px solid #05FF83;
            color: #05FF83;
            background: transparent;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .open-resume-btn:hover {
            background: #05FF83;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <img src="logo.png" alt="三号原点 | Alyx的内心" style="width: 100%; border-radius: 12px;">
    </div>

    <div class="text-content">
        <h1>三号原点</h1>
        <p>从故事出发，用AI造梦，窥见趋势的暗流</p>
        <p class="info-p">坐标：Alyx的内心 | 时间：永远</p>
    </div>

    <div class="footer">
        © 2026 三号原点. Powered by AI Dreams & Alyx Soul.
        <button class="open-resume-btn" onclick="toggleResume()">查看简历 [OPEN DOSSIER]</button>

        <div class="modal-overlay" id="resumeModal">
            <div class="resume-window">
                <span class="close-btn" onclick="toggleResume()">✕</span>
                <div class="resume-content">
                    <h2>Alyx / 三号原点</h2>
                    <div class="resume-section">
                        <h3>个人核心 / Core</h3>
                        <p>AI 创作者、趋势观察者</p>
                        <p>专注于在数字暗流中捕捉故事的涟漪。</p>
                    </div>
                    <div class="resume-section">
                        <h3>技能轨迹 / Skills</h3>
                        <p>· 提示词工程 (Prompt Engineering)</p>
                        <p>· 视觉概念设计 (Concept Design)</p>
                        <p>· 跨维度叙事 (Cross-media Storytelling)</p>
                    </div>
                    <div class="resume-section">
                        <h3>坐标 / Location</h3>
                        <p>Alyx 的内心深处，时间永远。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleResume() {
            const modal = document.getElementById('resumeModal');
            modal.classList.toggle('active');
        }

        // 点击窗口外部也可以关闭
        window.onclick = function (event) {
            const modal = document.getElementById('resumeModal');
            if (event.target == modal) {
                toggleResume();
            }
        }
    </script>
</body>

</html>
